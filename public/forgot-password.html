<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - Habit Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #06b6d4;
      --teal-dark: #028aa5;
      --bg: #f7fbfc;
      --muted: #556170;
      --white: #ffffff;
      --error: #e53e3e;
      --success: #38a169;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .forgot-container {
      background: var(--white);
      padding: 40px 35px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      text-align: center;
      width: 340px;
    }

    .forgot-container h1 {
      font-size: 32px;
      margin-bottom: 5px;
      font-weight: 700;
      color: var(--teal);
    }

    .forgot-container h2 {
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: 500;
      color: #444;
    }

    .forgot-container p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: #333;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
      box-sizing: border-box;
    }

    .input-group input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 4px rgba(6, 182, 212, 0.3);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background: var(--teal-dark);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .back-text {
      margin-top: 15px;
      font-size: 14px;
      color: var(--muted);
    }

    .back-text a {
      color: var(--teal);
      text-decoration: none;
      font-weight: 500;
    }

    .back-text a:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 0.8rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.85rem;
    }

    .alert-error {
      background: #fed7d7;
      color: var(--error);
      border: 1px solid #feb2b2;
    }

    .alert-success {
      background: #c6f6d5;
      color: var(--success);
      border: 1px solid #9ae6b4;
    }

    .error-message {
      color: var(--error);
      font-size: 0.75rem;
      margin-top: 0.3rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="forgot-container">
    <h1>Habit Tracker</h1>
    <h2>Forgot Password</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>

    <div class="alert alert-error" id="errorAlert">
      <span id="errorMessage"></span>
    </div>
    
    <div class="alert alert-success" id="successAlert">
      <span id="successMessage"></span>
    </div>

    <form id="forgotForm">
      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        <div class="error-message" id="emailError"></div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Reset Password</button>
    </form>

    <p class="back-text">Remembered? <a href="login.html">Go back to Login</a></p>
  </div>

  <script>
  // ===== API CONFIGURATION =====
  const API_BASE = 'https://habit-tracker-wsv3.onrender.com';

  document.getElementById("forgotForm").addEventListener("submit", async function(event) {
    event.preventDefault();
    
    const email = document.getElementById("email").value.trim();
    const submitBtn = document.getElementById("submitBtn");
    const emailError = document.getElementById("emailError");
    const errorAlert = document.getElementById("errorAlert");
    const successAlert = document.getElementById("successAlert");
    
    // Hide previous alerts
    errorAlert.style.display = "none";
    successAlert.style.display = "none";
    emailError.style.display = "none";
    
    // Validate email
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email) {
      emailError.textContent = "Please enter your email address";
      emailError.style.display = "block";
      return;
    }
    if (!emailRegex.test(email)) {
      emailError.textContent = "Please enter a valid email address";
      emailError.style.display = "block";
      return;
    }
    
    // Disable button during processing
    submitBtn.disabled = true;
    submitBtn.textContent = "Sending...";
    
    try {
      // Try API call to backend
      const response = await fetch(`${API_BASE}/api/forgot-password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ email })
      });

      if (response.ok) {
        const data = await response.json();
        
        // Show success message
        successAlert.style.display = "block";
        document.getElementById("successMessage").innerHTML = "✅ " + (data.message || "Password reset link has been sent to your email!");
        
        // Clear form
        document.getElementById("email").value = "";
        
        // Redirect to login after 3 seconds
        setTimeout(() => {
          window.location.href = "login.html";
        }, 3000);
        
      } else {
        const errorData = await response.json();
        
        if (response.status === 404) {
          errorAlert.style.display = "block";
          document.getElementById("errorMessage").innerHTML = "❌ No account found with this email address.";
        } else {
          errorAlert.style.display = "block";
          document.getElementById("errorMessage").innerHTML = "❌ " + (errorData.message || "Failed to send reset link. Please try again.");
        }
        submitBtn.disabled = false;
        submitBtn.textContent = "Reset Password";
      }
      
    } catch (error) {
      console.error("Forgot password error:", error);
      
      // Fallback message since backend doesn't have this endpoint yet
      errorAlert.style.display = "block";
      document.getElementById("errorMessage").innerHTML = "⚠️ Password reset is temporarily unavailable. Please contact support or try again later.";
      submitBtn.disabled = false;
      submitBtn.textContent = "Reset Password";
    }
  });
</script>
</body>
</html>
